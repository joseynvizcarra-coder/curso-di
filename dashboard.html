<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard privado — Curso DI</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
:root {
  --cream: #f5f2ec; --dark: #0f1117; --terra: #c85c3a; --blue: #3a6b8a;
  --muted: #7a7570; --border: #ddd8d0; --success: #2d7a4f; --terra-light: #f7ede8; --blue-light: #e8f0f5;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--cream); color: var(--dark); font-family: 'Calibri', 'Segoe UI', sans-serif; min-height: 100vh; }

.header-main { background: linear-gradient(135deg, var(--dark) 0%, #1e2030 100%); border-bottom: 3px solid var(--terra); padding: 1.8rem 0; }
.header-inner { max-width: 1000px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
.header-main h1 { font-family: Georgia, serif; font-size: 1.5rem; font-weight: normal; color: #fff; }
.header-main .tag { font-size: 0.72rem; color: var(--terra); text-transform: uppercase; letter-spacing: 0.1em; }
.header-actions { display: flex; gap: 0.5rem; }
.hbtn { font-size: 0.8rem; color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); border-radius: 20px; padding: 0.4rem 1rem; cursor: pointer; transition: all 0.2s; }
.hbtn:hover { background: rgba(255,255,255,0.2); color: #fff; }

.main-container { max-width: 1000px; margin: 0 auto; padding: 2.5rem 1.5rem; }
.section-title { font-family: Georgia, serif; font-size: 0.75rem; font-weight: normal; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin: 0 0 1.2rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); }

/* GATE (login) */
.gate { max-width: 420px; margin: 5rem auto; background: #fff; border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); overflow: hidden; }
.gate-head { background: var(--dark); color: #fff; padding: 1.5rem; text-align: center; }
.gate-head i { font-size: 2rem; color: var(--terra); }
.gate-head h2 { font-family: Georgia, serif; font-weight: normal; font-size: 1.2rem; margin-top: 0.5rem; }
.gate-head p { font-size: 0.82rem; color: #a09a94; margin-top: 0.3rem; }
.gate-body { padding: 1.5rem; }
.gate-body label { font-size: 0.82rem; color: var(--muted); display: block; margin-bottom: 0.4rem; }
.gate-body input { width: 100%; padding: 0.7rem 0.9rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; font-family: inherit; }
.gate-body input:focus { outline: none; border-color: var(--blue); }
.gate-body button { width: 100%; margin-top: 1rem; background: var(--terra); border: none; color: #fff; border-radius: 8px; padding: 0.7rem; font-size: 0.92rem; cursor: pointer; font-family: inherit; }
.gate-body button:hover { background: #a8492d; }
.gate-error { color: #a03020; font-size: 0.82rem; margin-top: 0.8rem; text-align: center; min-height: 1rem; }

/* STATS */
.dash-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 1.5rem; }
@media(max-width:640px){ .dash-grid { grid-template-columns: repeat(2,1fr); } }
.dash-stat { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem 1rem; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
.dash-stat .num { font-family: Georgia, serif; font-size: 2rem; color: var(--terra); line-height: 1; }
.dash-stat .lbl { font-size: 0.74rem; color: var(--muted); margin-top: 0.35rem; }
.dash-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
@media(max-width:780px){ .dash-charts { grid-template-columns: 1fr; } }
.dash-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 1.3rem 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
.dash-card h6 { font-family: Georgia, serif; font-weight: normal; font-size: 0.95rem; color: var(--dark); margin-bottom: 1.1rem; }
.bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 150px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
.bar-col .val { font-size: 0.6rem; color: var(--dark); font-weight: bold; height: 0.9rem; }
.bar-col .bar { width: 100%; background: linear-gradient(180deg, #e07a5a, var(--terra)); border-radius: 4px 4px 0 0; min-height: 2px; }
.bar-col .bar.zero { background: var(--border); }
.bar-col .tick { font-size: 0.58rem; color: var(--muted); white-space: nowrap; height: 0.9rem; margin-top: 3px; }
.hbar { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.55rem; }
.hbar .hlabel { font-size: 0.8rem; width: 42px; color: var(--dark); font-weight: bold; flex-shrink: 0; }
.hbar .htrack { flex: 1; background: var(--cream); border-radius: 99px; height: 18px; overflow: hidden; }
.hbar .hfill { height: 100%; background: linear-gradient(90deg, var(--terra), #e07a5a); border-radius: 99px; }
.hbar .hval { font-size: 0.75rem; color: var(--muted); width: 28px; text-align: right; flex-shrink: 0; }
.dash-note { font-size: 0.78rem; color: var(--muted); text-align: center; margin-top: 0.3rem; }
.dash-empty { text-align: center; color: var(--muted); font-size: 0.9rem; padding: 3rem 1rem; background:#fff; border:1px solid var(--border); border-radius:12px; line-height:1.6; }
.dash-empty i { font-size: 2rem; color: var(--border); display:block; margin-bottom: 0.6rem; }
.recent-list { font-size: 0.82rem; }
.recent-row { display: flex; align-items: center; gap: 0.8rem; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
.recent-row:last-child { border-bottom: none; }
.recent-row .r-when { color: var(--muted); width: 130px; flex-shrink: 0; }
.recent-row .r-page { font-weight: bold; }
.recent-row .r-dev { margin-left: auto; color: var(--muted); }
</style>
</head>
<body>

<!-- GATE -->
<div id="gate" class="gate">
  <div class="gate-head">
    <i class="bi bi-shield-lock"></i>
    <h2>Dashboard privado</h2>
    <p>Estadísticas de visitas — solo para ti</p>
  </div>
  <div class="gate-body">
    <label for="keyInput">Clave de acceso</label>
    <input type="password" id="keyInput" placeholder="Tu clave secreta" autocomplete="current-password">
    <button onclick="enterDash()">Entrar</button>
    <div class="gate-error" id="gateError"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash" style="display:none">
  <div class="header-main">
    <div class="header-inner">
      <div>
        <div class="tag">Panel privado</div>
        <h1>Estadísticas de visitas</h1>
      </div>
      <div class="header-actions">
        <button class="hbtn" onclick="refreshDash()"><i class="bi bi-arrow-clockwise me-1"></i>Actualizar</button>
        <button class="hbtn" onclick="logoutDash()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
      </div>
    </div>
  </div>
  <div class="main-container">
    <div id="dashContent">
      <div class="dash-empty"><i class="bi bi-hourglass-split"></i>Cargando datos…</div>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzW-icHpsefBYG2Pzahg2t6LLLFO6Gdm1nXHUfG0xLtrHT8dDzq6J1wqcPnN53p2zEv/exec';

function jsonp(params) {
  return new Promise(function(resolve, reject) {
    var cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*1e6);
    var script = document.createElement('script');
    function cleanup(){ try { delete window[cb]; } catch(e) { window[cb] = undefined; } if (script.parentNode) script.parentNode.removeChild(script); }
    window[cb] = function(data){ cleanup(); resolve(data); };
    var qp = new URLSearchParams(Object.assign({}, params, { callback: cb }));
    script.src = SCRIPT_URL + '?' + qp.toString();
    script.onerror = function(){ cleanup(); reject(new Error('conexion')); };
    setTimeout(function(){ if (window[cb]) { cleanup(); reject(new Error('timeout')); } }, 20000);
    document.head.appendChild(script);
  });
}

function enterDash() {
  const key = document.getElementById('keyInput').value.trim();
  if (!key) { document.getElementById('gateError').textContent = 'Escribe tu clave.'; return; }
  document.getElementById('gateError').textContent = '';
  localStorage.setItem('di_dash_key', key);
  showDash();
  loadVisits();
}

function showDash() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('dash').style.display = 'block';
}

function logoutDash() {
  localStorage.removeItem('di_dash_key');
  document.getElementById('dash').style.display = 'none';
  document.getElementById('gate').style.display = 'block';
  document.getElementById('keyInput').value = '';
}

function refreshDash() {
  document.getElementById('dashContent').innerHTML = '<div class="dash-empty"><i class="bi bi-hourglass-split"></i>Actualizando…</div>';
  loadVisits();
}

async function loadVisits() {
  const key = localStorage.getItem('di_dash_key') || '';
  const cont = document.getElementById('dashContent');
  try {
    const data = await jsonp({ action: 'getVisits', key: key });
    if (!data.ok) {
      if (/autoriz/i.test(data.error || '')) {
        // clave incorrecta: volver al gate
        document.getElementById('dash').style.display = 'none';
        document.getElementById('gate').style.display = 'block';
        document.getElementById('gateError').textContent = 'Clave incorrecta. Inténtalo de nuevo.';
        return;
      }
      throw new Error(data.error || 'sin datos');
    }
    render(data.visits || []);
  } catch(e) {
    cont.innerHTML = '<div class="dash-empty"><i class="bi bi-wifi-off"></i>No se pudieron cargar los datos.<br>Verifica que el Apps Script tenga las funciones de visitas y la acción <code>getVisits</code>.</div>';
  }
}

function dashShell() {
  return `
    <p class="section-title">Resumen</p>
    <div class="dash-grid">
      <div class="dash-stat"><div class="num" id="dsVisitas">—</div><div class="lbl">Visitas</div></div>
      <div class="dash-stat"><div class="num" id="dsVisitantes">—</div><div class="lbl">Visitantes únicos</div></div>
      <div class="dash-stat"><div class="num" id="dsPaginas">—</div><div class="lbl">Páginas vistas</div></div>
      <div class="dash-stat"><div class="num" id="dsMovil">—</div><div class="lbl">Desde móvil</div></div>
    </div>
    <div class="dash-charts">
      <div class="dash-card"><h6>Visitas por día (últimos 14)</h6><div id="chartDays" class="bar-chart"></div></div>
      <div class="dash-card"><h6>Actividad por hora del día</h6><div id="chartHours" class="bar-chart"></div></div>
    </div>
    <div class="dash-card"><h6>Páginas más vistas</h6><div id="chartUnits"></div></div>
    <div class="dash-card"><h6>Últimas visitas</h6><div id="recentList" class="recent-list"></div></div>
    <p class="dash-note" id="dashNote"></p>`;
}

function renderBars(elId, items, showVal) {
  const el = document.getElementById(elId);
  const max = Math.max(1, ...items.map(i => i.n));
  el.innerHTML = items.map(i => {
    const px = i.n === 0 ? 2 : Math.round(i.n / max * 110);
    return '<div class="bar-col"><span class="val">' + (showVal && i.n ? i.n : '') + '</span>'
      + '<div class="bar' + (i.n===0?' zero':'') + '" style="height:' + px + 'px"></div>'
      + '<span class="tick">' + i.label + '</span></div>';
  }).join('');
}

function pageLabel(id) {
  if (!id) return '—';
  if (id === 'index') return 'Portada';
  if (id.charAt(0) === 'm') return 'Unidad ' + id.slice(1).replace('-', '.');
  return id;
}

function visitDate(x) {
  let d = new Date(x.ts);
  if (isNaN(d.getTime())) d = new Date(x.date);
  return isNaN(d.getTime()) ? null : d;
}
function dayKeyOf(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function hourOf(x) { const d = visitDate(x); if (d) return d.getHours(); const h = Number(x.hour); return (h>=0 && h<24) ? h : 0; }
function isOwner(x) { return x.owner === true || x.owner === 'true' || x.owner === 'TRUE' || x.owner === '1'; }

function render(all) {
  const cont = document.getElementById('dashContent');
  const v = all.filter(x => !isOwner(x));
  if (v.length === 0) {
    cont.innerHTML = '<div class="dash-empty"><i class="bi bi-people"></i>Todavía no hay visitas de otras personas registradas.<br>Cuando alguien entre a tu página, aparecerá aquí.</div>';
    return;
  }
  cont.innerHTML = dashShell();

  const sids = new Set(v.map(x => x.sid));
  const vids = new Set(v.map(x => x.vid));
  document.getElementById('dsVisitas').textContent = sids.size;
  document.getElementById('dsVisitantes').textContent = vids.size;
  document.getElementById('dsPaginas').textContent = v.length;

  const devBySid = {};
  v.forEach(x => { if (!devBySid[x.sid]) devBySid[x.sid] = x.device; });
  const ses = Object.values(devBySid);
  const movil = ses.filter(d => d === 'movil').length;
  document.getElementById('dsMovil').textContent = ses.length ? Math.round(movil/ses.length*100) + '%' : '0%';

  const byDay = {}; const seen = {};
  v.forEach(x => { const d = visitDate(x); if (!d) return; const key = dayKeyOf(d); const k = key + '|' + x.sid; if (seen[k]) return; seen[k]=1; byDay[key] = (byDay[key]||0)+1; });
  const days = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    days.push({ label: (d.getMonth()+1) + '/' + d.getDate(), n: byDay[ds] || 0 });
  }
  renderBars('chartDays', days, true);

  const byHour = new Array(24).fill(0);
  v.forEach(x => { const h = hourOf(x); if (h>=0 && h<24) byHour[h]++; });
  renderBars('chartHours', byHour.map((n, h) => ({ label: (h%3===0)? (h+'h') : '', n })), false);

  const byPage = {};
  v.forEach(x => { byPage[x.page] = (byPage[x.page]||0)+1; });
  const pages = Object.entries(byPage).map(([id,n]) => ({ n, label: pageLabel(id) })).sort((a,b)=>b.n-a.n);
  const maxP = pages.length ? Math.max(...pages.map(p=>p.n)) : 1;
  document.getElementById('chartUnits').innerHTML = pages.map(p =>
    '<div class="hbar"><span class="hlabel" style="width:auto;min-width:70px">' + p.label + '</span><div class="htrack"><div class="hfill" style="width:' + Math.round(p.n/maxP*100) + '%"></div></div><span class="hval">' + p.n + '</span></div>'
  ).join('');

  const recent = v.slice().sort((a,b) => ((visitDate(b)&&visitDate(b).getTime())||0) - ((visitDate(a)&&visitDate(a).getTime())||0)).slice(0, 12);
  document.getElementById('recentList').innerHTML = recent.map(x => {
    const d = visitDate(x);
    const when = d ? d.toLocaleString('es-CL', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    return '<div class="recent-row"><span class="r-when">' + when + '</span><span class="r-page">' + pageLabel(x.page) + '</span><span class="r-dev"><i class="bi bi-' + (x.device==='movil'?'phone':'laptop') + ' me-1"></i>' + (x.device||'—') + '</span></div>';
  }).join('');

  const sesPorVid = {};
  v.forEach(x => { (sesPorVid[x.vid] = sesPorVid[x.vid] || new Set()).add(x.sid); });
  const recurrentes = Object.values(sesPorVid).filter(s => s.size > 1).length;
  const nuevos = vids.size - recurrentes;
  const tuyas = all.filter(x => isOwner(x)).length;
  document.getElementById('dashNote').textContent =
    'Visitantes nuevos: ' + nuevos + ' · Recurrentes: ' + recurrentes + '. Tus propias visitas (' + tuyas + ') quedan fuera de estos números.';
}

// Auto-entrar si ya hay clave guardada
if (localStorage.getItem('di_dash_key')) { showDash(); loadVisits(); }
document.getElementById('keyInput').addEventListener('keydown', e => { if (e.key === 'Enter') enterDash(); });
</script>
</body>
</html>
